<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stake $1 Challenge</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-light: #1a1a28;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── Wheel ── */
  .wheel-container {
    position: relative;
    width: 420px;
    height: 420px;
    margin: 0 auto;
  }

  .wheel-outer-glow {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #f59e0b22, #f59e0b08, #f59e0b22, #f59e0b08, #f59e0b22);
    filter: blur(18px);
    animation: glowPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: .55; transform: scale(1); }
    50% { opacity: .85; transform: scale(1.04); }
  }

  .wheel-canvas-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  canvas#wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    filter: drop-shadow(0 0 24px #f59e0b44);
  }

  /* Centre hub */
  .wheel-hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle, #1e1e2e 0%, #12121a 100%);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    box-shadow: 0 0 20px #f59e0b44;
  }

  .wheel-hub span {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* Pointer */
  .wheel-pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    filter: drop-shadow(0 4px 12px #f59e0b88);
  }

  .wheel-pointer svg { width: 40px; height: 48px; }

  /* ── Spin Button ── */
  .spin-btn {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #0a0a0f;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 3px;
    border: none;
    padding: 16px 56px;
    border-radius: 60px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 0 30px #f59e0b55, inset 0 -3px 0 #b45309;
    text-transform: uppercase;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 0 50px #f59e0b88, inset 0 -3px 0 #b45309;
  }

  .spin-btn:active:not(:disabled) { transform: scale(.97); }
  .spin-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Bet Spinner (slot-machine style) ── */
  .bet-reel-container {
    perspective: 600px;
    height: 200px;
    overflow: hidden;
    position: relative;
    border-radius: 16px;
    border: 2px solid #f59e0b44;
    background: #0d0d14;
  }

  .bet-reel-container::before,
  .bet-reel-container::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 60px;
    z-index: 2;
    pointer-events: none;
  }

  .bet-reel-container::before {
    top: 0;
    background: linear-gradient(to bottom, #0d0d14, transparent);
  }

  .bet-reel-container::after {
    bottom: 0;
    background: linear-gradient(to top, #0d0d14, transparent);
  }

  .bet-reel-highlight {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 0; right: 0;
    height: 52px;
    border-top: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    background: #f59e0b0a;
    z-index: 1;
    pointer-events: none;
  }

  .bet-reel {
    transition: transform 3s cubic-bezier(.15, .85, .3, 1);
    will-change: transform;
  }

  .bet-reel-item {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    gap: 10px;
    white-space: nowrap;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid #ffffff0a;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 24px #0004;
  }

  /* ── Animated numbers ── */
  .bankroll-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: var(--gold);
    transition: color .3s;
  }

  .bankroll-value.flash-green { color: var(--green); }
  .bankroll-value.flash-red { color: var(--red); }

  /* ── Game result display ── */
  .result-card {
    background: linear-gradient(135deg, #1a1a28, #12121a);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 28px;
    text-align: center;
    animation: resultPop .4s cubic-bezier(.34, 1.56, .64, 1);
    box-shadow: 0 0 40px #f59e0b22;
  }

  @keyframes resultPop {
    from { transform: scale(.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-emoji { font-size: 64px; }
  .result-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    margin-top: 8px;
  }

  /* ── History ── */
  .history-log {
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #f59e0b33 transparent;
  }

  .history-log::-webkit-scrollbar { width: 6px; }
  .history-log::-webkit-scrollbar-track { background: transparent; }
  .history-log::-webkit-scrollbar-thumb { background: #f59e0b33; border-radius: 3px; }

  .history-entry {
    padding: 8px 12px;
    border-bottom: 1px solid #ffffff06;
    font-size: 13px;
    color: #94a3b8;
    animation: slideIn .3s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Busted overlay ── */
  .busted-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0fee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn .5s;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .busted-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 80px;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 60px #ef444488, 0 0 120px #ef444444;
    animation: bustedShake .6s ease-in-out;
  }

  @keyframes bustedShake {
    0%, 100% { transform: translateX(0) scale(1); }
    20% { transform: translateX(-15px) scale(1.1); }
    40% { transform: translateX(15px) scale(1.05); }
    60% { transform: translateX(-8px) scale(1.02); }
    80% { transform: translateX(8px) scale(1); }
  }

  /* ── Stats chart ── */
  .chart-container {
    background: #0d0d14;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #ffffff08;
  }

  /* ── Buttons ── */
  .btn {
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    font-size: 14px;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(.97); }

  .btn-green { background: #10b98122; color: var(--green); border: 1px solid #10b98144; }
  .btn-green:hover { background: #10b98133; }
  .btn-red { background: #ef444422; color: var(--red); border: 1px solid #ef444444; }
  .btn-red:hover { background: #ef444433; }
  .btn-gold { background: #f59e0b22; color: var(--gold); border: 1px solid #f59e0b44; }
  .btn-gold:hover { background: #f59e0b33; }
  .btn-blue { background: #3b82f622; color: var(--blue); border: 1px solid #3b82f644; }
  .btn-blue:hover { background: #3b82f633; }
  .btn-dark { background: #1e1e2e; color: #94a3b8; border: 1px solid #ffffff0a; }
  .btn-dark:hover { background: #2a2a3a; }

  /* ── Particles ── */
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    pointer-events: none;
    animation: particleFloat 3s ease-out forwards;
  }

  @keyframes particleFloat {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: #0a0a0fcc;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    animation: fadeIn .2s;
  }

  .modal-box {
    background: var(--card);
    border: 1px solid #ffffff0a;
    border-radius: 20px;
    padding: 32px;
    min-width: 340px;
    animation: resultPop .3s;
  }

  .modal-box input {
    background: #0d0d14;
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e2e8f0;
    font-size: 18px;
    width: 100%;
    outline: none;
    font-family: 'Orbitron', sans-serif;
  }

  .modal-box input:focus { border-color: var(--gold); }

  /* ── Stats panel ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: #0d0d14;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    border: 1px solid #ffffff06;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--gold);
  }

  .stat-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
</style>
<!-- Recording mode: ?record strips everything except wheel + spin -->
<style id="recordModeCSS">
  body.record-mode #bustedOverlay,
  body.record-mode #modal,
  body.record-mode aside:last-of-type { display: none !important; }
  
  /* Portrait TikTok layout: 1080x1920 */
  body.record-mode .flex-col.lg\:flex-row {
    display: flex !important;
    flex-direction: column !important;
    min-height: 100vh;
    width: 100%;
  }
  
  /* Stats sidebar → compact vertical block at top */
  body.record-mode aside:first-of-type {
    width: 100% !important;
    flex: none !important;
    padding: 30px 24px 16px !important;
    border-right: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.08) !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    gap: 12px !important;
  }
  /* Title bigger for TikTok */
  body.record-mode aside:first-of-type h1 {
    font-size: 32px !important;
    letter-spacing: 6px !important;
  }
  /* Day + Bankroll side by side */
  body.record-mode aside:first-of-type .card {
    padding: 10px 24px !important;
    margin: 0 !important;
  }
  body.record-mode aside:first-of-type .card .text-4xl { font-size: 2.5rem !important; }
  body.record-mode aside:first-of-type .card .bankroll-value { font-size: 3rem !important; }
  /* Stat grid: 4 items in a row */
  body.record-mode aside:first-of-type .grid {
    display: grid !important;
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 8px !important;
    width: 100% !important;
    max-width: 900px !important;
  }
  body.record-mode aside:first-of-type .grid .card { padding: 8px 12px !important; }
  /* Hide all action buttons */
  body.record-mode aside:first-of-type .btn-gold,
  body.record-mode aside:first-of-type .btn-green,
  body.record-mode aside:first-of-type .btn-red,
  body.record-mode aside:first-of-type .btn-dark,
  body.record-mode aside:first-of-type .flex-col.gap-2,
  body.record-mode aside:first-of-type .flex.gap-2.mt-auto { display: none !important; }
  
  /* Wheel fills the rest — big and centered */
  body.record-mode #mainArea {
    flex: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 20px !important;
  }
  /* Big wheel for portrait */
  body.record-mode .wheel-container {
    width: 580px !important;
    height: 580px !important;
  }
  body.record-mode .spin-btn {
    font-size: 28px !important;
    padding: 20px 64px !important;
    margin-top: 24px !important;
  }
</style>
<script>
  if (window.location.search.includes('record')) {
    document.body?.classList.add('record-mode');
    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('record-mode');
    });
  }
</script>
</head>
<body>

<!-- ─── BUSTED OVERLAY ─── -->
<div id="bustedOverlay" class="busted-overlay" style="display:none">
  <div class="busted-text">BUSTED 💀</div>
  <p style="color:#94a3b8;margin-top:24px;font-size:18px;">Your bankroll hit $0.00</p>
  <button class="btn btn-red" style="margin-top:24px;font-size:18px;padding:16px 40px;" onclick="resetAfterBust()">Start Fresh 🔄</button>
</div>

<!-- ─── MODAL ─── -->
<div id="modal" class="modal-backdrop" style="display:none">
  <div class="modal-box" id="modalContent"></div>
</div>

<!-- ─── MAIN LAYOUT ─── -->
<div class="flex flex-col lg:flex-row min-h-screen">

  <!-- LEFT: Bankroll Sidebar -->
  <aside class="lg:w-80 w-full p-4 lg:p-6 flex flex-col gap-4 lg:border-r border-white/5" style="background:#0c0c14;">

    <!-- Title -->
    <div class="text-center lg:text-left">
      <h1 class="text-lg font-black tracking-widest" style="font-family:'Orbitron';color:var(--gold);">STAKE $1</h1>
      <p class="text-xs text-gray-500 tracking-wider uppercase">Daily Challenge Tracker</p>
    </div>

    <!-- Day -->
    <div class="card text-center">
      <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Day</p>
      <p id="dayNum" class="text-4xl font-black" style="font-family:'Orbitron';color:var(--gold);">1</p>
    </div>

    <!-- Bankroll -->
    <div class="card text-center">
      <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Current Bankroll</p>
      <p id="bankrollDisplay" class="bankroll-value">$1.00</p>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-2 gap-3">
      <div class="card text-center py-3">
        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Starting</p>
        <p id="startBalance" class="text-sm font-bold text-gray-300" style="font-family:'Orbitron';">$1.00</p>
      </div>
      <div class="card text-center py-3">
        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Session P/L</p>
        <p id="sessionPL" class="text-sm font-bold" style="font-family:'Orbitron';color:var(--green);">$0.00</p>
      </div>
      <div class="card text-center py-3">
        <p class="text-[10px] text-gray-500 uppercase tracking-wider">All-Time High</p>
        <p id="athDisplay" class="text-sm font-bold" style="font-family:'Orbitron';color:var(--gold);">$1.00</p>
      </div>
      <div class="card text-center py-3">
        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Today Added</p>
        <p id="todayAdded" class="text-sm font-bold text-gray-400" style="font-family:'Orbitron';">$1.00</p>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="flex flex-col gap-2">
      <button class="btn btn-gold w-full" onclick="addDailyDollar()">💵 Add Daily $1</button>
      <div class="flex gap-2">
        <button id="btnWon" class="btn btn-green flex-1" onclick="showWonModal()" disabled>✅ I Won</button>
        <button id="btnLost" class="btn btn-red flex-1" onclick="handleLoss()" disabled>💀 I Lost</button>
      </div>
    </div>

    <!-- Utility buttons -->
    <div class="flex gap-2 mt-auto">
      <button class="btn btn-dark flex-1 text-xs" onclick="toggleStats()">📊 Stats</button>
      <button class="btn btn-dark flex-1 text-xs" onclick="exportHistory()">📥 Export</button>
      <button class="btn btn-dark flex-1 text-xs" onclick="confirmReset()">🔄 Reset</button>
    </div>
  </aside>

  <!-- CENTER: Wheel Area -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 gap-6 relative" id="mainArea">

    <!-- Game result (hidden by default) -->
    <div id="gameResult" style="display:none;"></div>

    <!-- Wheel -->
    <div id="wheelSection">
      <div class="wheel-container" id="wheelContainer">
        <div class="wheel-outer-glow"></div>
        <div class="wheel-canvas-wrap">
          <canvas id="wheelCanvas" width="840" height="840"></canvas>
          <div class="wheel-hub"><span>STAKE</span></div>
        </div>
        <div class="wheel-pointer">
          <svg viewBox="0 0 40 48" fill="none">
            <path d="M20 48 L4 8 A18 18 0 0 1 36 8 Z" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
            <circle cx="20" cy="14" r="5" fill="#0a0a0f"/>
          </svg>
        </div>
      </div>

      <div class="text-center mt-6">
        <button id="spinBtn" class="spin-btn" onclick="spinWheel()">🎰 SPIN</button>
      </div>
    </div>

    <!-- Bet size spinner (hidden) -->
    <div id="betSection" style="display:none;" class="w-full max-w-md">
      <div class="text-center mb-4">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Now choose your bet size</p>
      </div>
      <div class="bet-reel-container" id="betReelContainer">
        <div class="bet-reel-highlight"></div>
        <div class="bet-reel" id="betReel"></div>
      </div>
      <div class="text-center mt-4">
        <button id="betSpinBtn" class="spin-btn" style="font-size:16px;padding:14px 44px;" onclick="spinBetReel()">🎲 SPIN BET SIZE</button>
      </div>
    </div>

    <!-- Bet result (hidden) -->
    <div id="betResult" style="display:none;"></div>
  </main>

  <!-- RIGHT: History + Stats -->
  <aside class="lg:w-80 w-full p-4 lg:p-6 flex flex-col gap-4 lg:border-l border-white/5" style="background:#0c0c14;">
    <div>
      <h3 class="text-xs text-gray-500 uppercase tracking-widest mb-3">📜 History Log</h3>
      <div class="history-log card" id="historyLog" style="padding:8px;">
        <p class="text-gray-600 text-xs text-center py-4">No entries yet. Spin to begin!</p>
      </div>
    </div>

    <!-- Stats (toggle) -->
    <div id="statsPanel" style="display:none;">
      <h3 class="text-xs text-gray-500 uppercase tracking-widest mb-3">📊 Stats Dashboard</h3>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-container mt-4">
        <canvas id="chartCanvas" width="600" height="200"></canvas>
      </div>
    </div>
  </aside>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const GAMES = [
  { emoji: '🎲', name: 'Dice',         color: '#3b82f6' },
  { emoji: '📈', name: 'Crash',        color: '#8b5cf6' },
  { emoji: '💣', name: 'Mines',        color: '#ef4444' },
  { emoji: '🔴', name: 'Plinko',       color: '#f97316' },
  { emoji: '🃏', name: 'Blackjack',    color: '#10b981' },
  { emoji: '🎰', name: 'Slots',        color: '#ec4899' },
  { emoji: '🎯', name: 'Limbo',        color: '#06b6d4' },
  { emoji: '🟢', name: 'Roulette',     color: '#22c55e' },
  { emoji: '🔢', name: 'Keno',         color: '#a855f7' },
  { emoji: '🎪', name: 'Wheel',        color: '#f59e0b' },
  { emoji: '💎', name: 'Dragon Tower', color: '#14b8a6' },
  { emoji: '⚡', name: 'Hilo',         color: '#eab308' },
];

const BET_OPTIONS = [
  { pct: 0.10, label: 'Safe',     color: '#10b981' },
  { pct: 0.15, label: 'Steady',   color: '#22c55e' },
  { pct: 0.25, label: 'Bold',     color: '#f59e0b' },
  { pct: 0.35, label: 'Risky',    color: '#f97316' },
  { pct: 0.50, label: 'YOLO',     color: '#ef4444' },
  { pct: 1.00, label: 'ALL IN 🔥', color: '#dc2626' },
];

let state = {
  bankroll: 1.00,
  day: 1,
  startBalance: 1.00,
  ath: 1.00,
  todayAdded: 1.00,
  history: [],
  balanceHistory: [1.00],
  stats: { wins: 0, losses: 0, biggestWin: 0, biggestLoss: 0, bestStreak: 0, currentStreak: 0, streakType: null },
};

let currentGame = null;
let currentBet = null;
let spinning = false;
let wheelAngle = 0;

// ═══════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════
function saveState() {
  localStorage.setItem('stake_challenge', JSON.stringify(state));
}

function loadState() {
  const s = localStorage.getItem('stake_challenge');
  if (s) {
    try {
      const parsed = JSON.parse(s);
      state = { ...state, ...parsed };
    } catch(e) {}
  }
}

// ═══════════════════════════════════════
// AUDIO (Web Audio API tick sounds)
// ═══════════════════════════════════════
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick(freq = 1800, dur = 0.03) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playWinSound() {
  try {
    const ctx = getAudioCtx();
    [0, .1, .2].forEach((t, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = [523, 659, 784][i];
      gain.gain.setValueAtTime(0.12, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + .3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + .3);
    });
  } catch(e) {}
}

function playLoseSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + .5);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + .5);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + .5);
  } catch(e) {}
}

// ═══════════════════════════════════════
// WHEEL DRAWING
// ═══════════════════════════════════════
const canvas = document.getElementById('wheelCanvas');
const ctx2d = canvas.getContext('2d');

function drawWheel(angle) {
  const cx = 420, cy = 420, r = 400;
  const n = GAMES.length;
  const arc = (2 * Math.PI) / n;

  ctx2d.clearRect(0, 0, 840, 840);
  ctx2d.save();
  ctx2d.translate(cx, cy);
  ctx2d.rotate(angle);

  for (let i = 0; i < n; i++) {
    const a = i * arc;
    // Segment
    ctx2d.beginPath();
    ctx2d.moveTo(0, 0);
    ctx2d.arc(0, 0, r, a, a + arc);
    ctx2d.closePath();

    const grd = ctx2d.createRadialGradient(0, 0, r * .25, 0, 0, r);
    grd.addColorStop(0, GAMES[i].color + '44');
    grd.addColorStop(1, GAMES[i].color + 'bb');
    ctx2d.fillStyle = grd;
    ctx2d.fill();

    ctx2d.strokeStyle = '#0a0a0f';
    ctx2d.lineWidth = 2;
    ctx2d.stroke();

    // Text
    ctx2d.save();
    ctx2d.rotate(a + arc / 2);
    ctx2d.textAlign = 'center';
    ctx2d.fillStyle = '#fff';
    ctx2d.font = 'bold 26px Inter';
    ctx2d.fillText(GAMES[i].emoji, r * .68, 4);
    ctx2d.font = 'bold 15px Inter';
    ctx2d.fillText(GAMES[i].name, r * .68, 24);
    ctx2d.restore();
  }

  // Outer ring
  ctx2d.beginPath();
  ctx2d.arc(0, 0, r, 0, 2 * Math.PI);
  ctx2d.strokeStyle = '#f59e0b';
  ctx2d.lineWidth = 6;
  ctx2d.stroke();

  // Tick marks
  for (let i = 0; i < n; i++) {
    ctx2d.save();
    ctx2d.rotate(i * arc);
    ctx2d.beginPath();
    ctx2d.moveTo(r - 20, 0);
    ctx2d.lineTo(r, 0);
    ctx2d.strokeStyle = '#f59e0b';
    ctx2d.lineWidth = 3;
    ctx2d.stroke();
    ctx2d.restore();
  }

  ctx2d.restore();
}

// ═══════════════════════════════════════
// WHEEL SPIN
// ═══════════════════════════════════════
function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('gameResult').style.display = 'none';
  document.getElementById('betSection').style.display = 'none';
  document.getElementById('betResult').style.display = 'none';
  disableResultBtns();

  const n = GAMES.length;
  const arc = (2 * Math.PI) / n;
  const targetIdx = Math.floor(Math.random() * n);

  // The pointer is at top (–π/2). We need segment targetIdx centered under the pointer.
  // Segment i centre angle relative to wheel = i*arc + arc/2
  // Wheel angle needed so that centre is at –π/2:
  // angle + targetIdx*arc + arc/2 = –π/2 + 2πk  →  angle = –π/2 – targetIdx*arc – arc/2
  const baseAngle = -Math.PI / 2 - targetIdx * arc - arc / 2;
  const extraSpins = 5 + Math.random() * 5; // 5–10 full spins
  const targetAngle = baseAngle - extraSpins * 2 * Math.PI + (Math.random() - 0.5) * arc * 0.6;

  const startAngle = wheelAngle;
  const totalDelta = targetAngle - startAngle;
  const duration = 4000 + Math.random() * 1500;
  const startTime = performance.now();
  let lastSegment = -1;

  function animate(now) {
    const elapsed = now - startTime;
    let t = Math.min(elapsed / duration, 1);
    // Cubic ease-out for realistic deceleration
    t = 1 - Math.pow(1 - t, 3);

    wheelAngle = startAngle + totalDelta * t;
    drawWheel(wheelAngle);

    // Tick sound when crossing segment boundary
    const currentSegment = Math.floor((((-wheelAngle % (2 * Math.PI)) + 4 * Math.PI) % (2 * Math.PI)) / arc);
    if (currentSegment !== lastSegment) {
      playTick(1200 + Math.random() * 1200, 0.025);
      lastSegment = currentSegment;
    }

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      wheelAngle = targetAngle;
      
      // Determine which segment is ACTUALLY under the pointer (top = -π/2)
      // Normalize the wheel angle to find which segment is at the pointer position
      const pointerAngle = -Math.PI / 2;
      // The angle on the wheel that's at the pointer = pointerAngle - wheelAngle
      let segAngle = ((pointerAngle - wheelAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const actualIdx = Math.floor(segAngle / arc) % n;
      
      currentGame = GAMES[actualIdx];
      showGameResult(actualIdx);
      spawnParticles(document.getElementById('wheelContainer'));
    }
  }

  requestAnimationFrame(animate);
}

function showGameResult(idx) {
  const game = GAMES[idx];
  const el = document.getElementById('gameResult');
  el.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${game.emoji}</div>
      <div class="result-name">${game.name}</div>
      <p class="text-gray-400 text-sm mt-2">Go play this on Stake!</p>
    </div>
  `;
  el.style.display = 'block';
  playWinSound();

  // Show bet section
  setTimeout(() => {
    document.getElementById('betSection').style.display = 'block';
    buildBetReel();
    document.getElementById('betSpinBtn').disabled = false;
  }, 800);
}

// BET SIZE REEL
// ═══════════════════════════════════════
function buildBetReel() {
  const reel = document.getElementById('betReel');
  // Build multiple copies for smooth scrolling
  let html = '';
  const copies = 12;
  for (let c = 0; c < copies; c++) {
    for (let i = 0; i < BET_OPTIONS.length; i++) {
      const opt = BET_OPTIONS[i];
      const amt = (state.bankroll * opt.pct).toFixed(2);
      html += `<div class="bet-reel-item" style="color:${opt.color}">
        <span>${Math.round(opt.pct * 100)}%</span>
        <span style="color:#94a3b8">—</span>
        <span>${opt.label}</span>
        <span style="color:#94a3b8">—</span>
        <span style="font-family:'Orbitron'">$${amt}</span>
      </div>`;
    }
  }
  reel.innerHTML = html;
  reel.style.transition = 'none';
  reel.style.transform = 'translateY(0)';
}

function spinBetReel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('betSpinBtn').disabled = true;
  document.getElementById('betResult').style.display = 'none';

  const targetIdx = Math.floor(Math.random() * BET_OPTIONS.length);
  const itemH = 52;
  const totalItems = BET_OPTIONS.length;
  const spinSets = 6 + Math.floor(Math.random() * 4);
  const offset = spinSets * totalItems * itemH + targetIdx * itemH;
  // Centre in the container (container is 200px, highlight at 50%)
  const centreOffset = (200 / 2) - (itemH / 2);
  const finalY = -(offset - centreOffset);

  const reel = document.getElementById('betReel');
  reel.style.transition = 'none';
  reel.style.transform = 'translateY(0)';

  // Tick during spin
  let tickInterval = setInterval(() => playTick(900, 0.02), 80);
  setTimeout(() => clearInterval(tickInterval), 2600);

  requestAnimationFrame(() => {
    reel.style.transition = 'transform 3s cubic-bezier(.15,.85,.3,1)';
    reel.style.transform = `translateY(${finalY}px)`;
  });

  setTimeout(() => {
    spinning = false;
    const opt = BET_OPTIONS[targetIdx];
    currentBet = {
      pct: opt.pct,
      label: opt.label,
      amount: parseFloat((state.bankroll * opt.pct).toFixed(2))
    };
    showBetResult(opt);
    playWinSound();
  }, 3200);
}

function showBetResult(opt) {
  const amt = (state.bankroll * opt.pct).toFixed(2);
  const el = document.getElementById('betResult');
  el.innerHTML = `
    <div class="result-card" style="border-color:${opt.color};">
      <p class="text-gray-400 text-sm mb-2">Your bet size:</p>
      <p style="font-family:'Orbitron';font-size:36px;font-weight:900;color:${opt.color};">$${amt}</p>
      <p class="text-gray-500 text-sm mt-1">${Math.round(opt.pct*100)}% — ${opt.label}</p>
      <p class="text-gray-400 text-sm mt-4">Play <strong style="color:var(--gold)">${currentGame.emoji} ${currentGame.name}</strong> with this bet, then report back!</p>
    </div>
  `;
  el.style.display = 'block';
  enableResultBtns();
}

// ═══════════════════════════════════════
function enableResultBtns() {
  document.getElementById('btnWon').disabled = false;
  document.getElementById('btnLost').disabled = false;
}

function disableResultBtns() {
  document.getElementById('btnWon').disabled = true;
  document.getElementById('btnLost').disabled = true;
}

function showWonModal() {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <h3 style="font-family:'Orbitron';color:var(--green);font-size:20px;font-weight:900;margin-bottom:16px;">💰 How much did you win?</h3>
    <p class="text-gray-400 text-sm mb-4">Enter your <strong>profit</strong> (net win amount):</p>
    <input type="number" id="winInput" step="0.01" min="0.01" placeholder="0.00" autofocus>
    <div class="flex gap-3 mt-5">
      <button class="btn btn-green flex-1" onclick="confirmWin()">Confirm ✅</button>
      <button class="btn btn-dark flex-1" onclick="closeModal()">Cancel</button>
    </div>
  `;
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('winInput')?.focus(), 100);
}

function confirmWin() {
  const input = document.getElementById('winInput');
  const amount = parseFloat(input.value);
  if (isNaN(amount) || amount <= 0) return;

  state.bankroll = parseFloat((state.bankroll + amount).toFixed(2));
  if (state.bankroll > state.ath) state.ath = state.bankroll;

  // Stats
  state.stats.wins++;
  if (amount > state.stats.biggestWin) state.stats.biggestWin = amount;
  if (state.stats.streakType === 'win') {
    state.stats.currentStreak++;
  } else {
    state.stats.streakType = 'win';
    state.stats.currentStreak = 1;
  }
  if (state.stats.currentStreak > state.stats.bestStreak) state.stats.bestStreak = state.stats.currentStreak;

  // History
  const entry = `Day ${state.day}: ${currentGame.emoji} ${currentGame.name} — Bet $${currentBet.amount.toFixed(2)} (${Math.round(currentBet.pct*100)}%) — Won $${amount.toFixed(2)} ✅`;
  state.history.unshift(entry);
  state.balanceHistory.push(state.bankroll);

  closeModal();
  playWinSound();
  flashBankroll('green');
  updateUI();
  resetRound();
  saveState();
}

function handleLoss() {
  if (!currentBet) return;
  const lossAmt = currentBet.amount;

  state.bankroll = parseFloat(Math.max(0, state.bankroll - lossAmt).toFixed(2));

  // Stats
  state.stats.losses++;
  if (lossAmt > state.stats.biggestLoss) state.stats.biggestLoss = lossAmt;
  if (state.stats.streakType === 'loss') {
    state.stats.currentStreak++;
  } else {
    state.stats.streakType = 'loss';
    state.stats.currentStreak = 1;
  }

  // History
  const entry = `Day ${state.day}: ${currentGame.emoji} ${currentGame.name} — Bet $${lossAmt.toFixed(2)} (${Math.round(currentBet.pct*100)}%) — Lost 💀`;
  state.history.unshift(entry);
  state.balanceHistory.push(state.bankroll);

  playLoseSound();
  flashBankroll('red');
  updateUI();
  resetRound();
  saveState();

  if (state.bankroll <= 0) {
    setTimeout(() => {
      document.getElementById('bustedOverlay').style.display = 'flex';
    }, 600);
  }
}

function resetRound() {
  currentGame = null;
  currentBet = null;
  document.getElementById('gameResult').style.display = 'none';
  document.getElementById('betSection').style.display = 'none';
  document.getElementById('betResult').style.display = 'none';
  document.getElementById('spinBtn').disabled = false;
  disableResultBtns();
}

function updateHistory() {

    log.innerHTML = '<p class="text-gray-600 text-xs text-center py-4">No entries yet. Spin to begin!</p>';
    return;

  log.innerHTML = state.history.slice(0, 100).map(e => {

    const text = typeof e === 'string' ? e : `Day ${e.day}: ${e.game} — $${e.betAmount} (${e.betLabel}) — ${e.won ? '✅ WIN' : '❌ LOSS'}`;
    const isWin = typeof e === 'string' ? e.includes('✅') : e.won;
    return `<div class="history-entry" style="border-left:3px solid ${isWin ? 'var(--green)' : 'var(--red)'};">${text}</div>`;
  }).join('');
}

function toggleStats() {
  const panel = document.getElementById('statsPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    updateStats();

    panel.style.display = 'none';

function updateStats() {
  const s = state.stats;
  const total = s.wins + s.losses;
  const winRate = total > 0 ? ((s.wins / total) * 100).toFixed(1) : '0.0';
  const streakLabel = s.streakType === 'win' ? `${s.currentStreak}W 🔥` : s.streakType === 'loss' ? `${s.currentStreak}L 💀` : '—';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${state.day}</div><div class="stat-label">Days Played</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${parseFloat(winRate)>=50?'var(--green)':'var(--red)'}">${winRate}%</div><div class="stat-label">Win Rate</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">$${s.biggestWin.toFixed(2)}</div><div class="stat-label">Biggest Win</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--red)">$${s.biggestLoss.toFixed(2)}</div><div class="stat-label">Biggest Loss</div></div>
    <div class="stat-card"><div class="stat-value">${streakLabel}</div><div class="stat-label">Current Streak</div></div>
    <div class="stat-card"><div class="stat-value">${s.bestStreak}</div><div class="stat-label">Best Streak</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--gold)">$${state.ath.toFixed(2)}</div><div class="stat-label">All-Time High</div></div>
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Bets</div></div>
  `;

  drawChart();
}

function drawChart() {
  const canvas = document.getElementById('chartCanvas');
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const data = state.balanceHistory;
  if (data.length < 2) return;

  c.clearRect(0, 0, w, h);

  const max = Math.max(...data) * 1.15;
  const min = 0;
  const range = max - min || 1;
  const stepX = w / (data.length - 1);

  // Grid lines
  c.strokeStyle = '#ffffff08';
  c.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = (h / 5) * i;
    c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke();
  }

  // Line
  c.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = i * stepX;
    const y = h - ((data[i] - min) / range) * (h - 20) - 10;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.strokeStyle = '#f59e0b';
  c.lineWidth = 2.5;
  c.stroke();

  // Fill under
  const lastX = (data.length - 1) * stepX;
  const lastY = h - ((data[data.length - 1] - min) / range) * (h - 20) - 10;
  c.lineTo(lastX, h);
  c.lineTo(0, h);
  c.closePath();
  const grd = c.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, '#f59e0b33');
  grd.addColorStop(1, '#f59e0b00');
  c.fillStyle = grd;
  c.fill();
}

// ═══════════════════════════════════════
function spawnParticles(container) {
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 160;
    p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
    p.style.left = '50%';
    p.style.top = '50%';
    p.style.background = ['#f59e0b', '#10b981', '#ef4444', '#3b82f6', '#ec4899'][Math.floor(Math.random()*5)];
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    container.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}
